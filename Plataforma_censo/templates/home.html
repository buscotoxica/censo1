<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CENSO Chile</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { overflow: hidden; max-width: 100vw; }

  body {
  font-family: 'DM Sans', sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #93c0e9;
  padding: 2rem;
  overflow: hidden;
  overflow-x: hidden;
  position: relative;
  width: 100vw;        /* <-- agregar */
  max-width: 100vw;    /* <-- agregar */
}

  /* ── BACKGROUND ── */
  .bg { position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse 70% 60% at 15% 20%, rgba(255,255,255,0.25) 0%, transparent 60%), radial-gradient(ellipse 55% 55% at 85% 80%, rgba(255,255,255,0.18) 0%, transparent 60%), radial-gradient(ellipse 40% 40% at 60% 10%, rgba(255,220,210,0.15) 0%, transparent 55%), radial-gradient(ellipse 60% 50% at 30% 90%, rgba(255,255,255,0.2) 0%, transparent 60%); animation: bgShift 12s ease-in-out infinite alternate; }
  @keyframes bgShift { 0% { filter: hue-rotate(0deg) brightness(1); } 100% { filter: hue-rotate(6deg) brightness(1.03); } }
  .bg::after { content: ''; position: absolute; inset: 0; background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E"); opacity: 0.3; pointer-events: none; }

  /* ── BLOBS ── */
  .blob { position: absolute; border-radius: 50%; z-index: 1; filter: blur(1px); animation: blobFloat 8s ease-in-out infinite alternate; }
  .blob-1 { width:280px; height:280px; background:linear-gradient(135deg,rgba(55,48,212,0.15),rgba(55,48,212,0.03)); top:5%; left:-4%; animation-delay:0s; }
  @keyframes blobFloat { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(-8px,-18px) scale(1.04); } }
  .blob-3 { width:140px; height:140px; background:linear-gradient(135deg,rgba(55,48,212,0.08),transparent); top:60%; left:5%; animation-delay:-5s; }
  @keyframes blobFloat { 0% { transform: translate(0,0) scale(1); } 100% { transform: translate(-8px,-18px) scale(1.04); } }

 .screen { 
  width:100%; 
  max-width:400px; 
  position:relative; 
  z-index:10;
  margin-left: auto;
  margin-right: auto;
}

  /* ── CARD ── */
  .card {
    background: rgba(255,255,255,0.45);
    backdrop-filter: blur(16px) saturate(160%);
    -webkit-backdrop-filter: blur(16px) saturate(160%);
    border: none;
    border-radius: 28px;
    box-shadow: 0 12px 40px rgba(74,140,200,0.18);
    padding: 2.4rem 2.2rem 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.2rem;
    text-decoration: none;
    color: inherit;
    position: relative;
    overflow: hidden;
    opacity: 0;
    animation: fadeUp 0.55s 0.2s forwards;
    will-change: transform;
    transition: transform 0.35s cubic-bezier(.22,.68,0,1.2), box-shadow 0.35s ease;
  }
  .card:hover { transform: perspective(900px) translateY(-22px) scale(1.025); box-shadow: 0 40px 70px rgba(74,140,200,0.28), 0 16px 30px rgba(74,140,200,0.15); }

  .card-strip { position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #3730d4 0%, #6b67e8 40%, #e83c1a 70%, #3730d4 100%); background-size: 200% 100%; animation: stripShimmer 3s linear infinite; }
  @keyframes stripShimmer { 0% { background-position: 0% 0%; } 100% { background-position: -200% 0%; } }

  .card-glare { position: absolute; inset: 0; border-radius: 24px; pointer-events: none; opacity: 0; transition: opacity 0.3s; z-index: 2; background: radial-gradient(circle at 50% 50%, rgba(255,255,255,0.18) 0%, transparent 65%); }
  .card-inner { position:relative; z-index:3; width:100%; display:flex; flex-direction:column; align-items:center; gap:1rem; }

  .card-logo { height: 88px; object-fit: contain; filter: drop-shadow(0 2px 8px rgba(0,0,0,0.08)); }

  .rule { width:100%; height:1px; background:linear-gradient(90deg, rgba(20,40,70,0.12), transparent); }

  .mini-grid { display:grid; grid-template-columns:1fr 1fr; gap:8px; width:100%; }
  .ms { background: rgba(255,255,255,0.35); border-radius: 14px; padding: 10px 12px; border: none; transition: background 0.2s, transform 0.2s; opacity: 0; animation: fadeUp 0.4s forwards; }
  .ms:nth-child(1) { animation-delay: 0.5s; }
  .ms:nth-child(2) { animation-delay: 0.62s; }
  .ms:nth-child(3) { animation-delay: 0.74s; }
  .ms:nth-child(4) { animation-delay: 0.86s; }
  .ms:hover { background: rgba(255,255,255,0.65); transform: translateY(-2px); }
  .ms-n { font-family:'Syne',sans-serif; font-size:24px; font-weight:700; letter-spacing:-0.5px; color:#1a2a3a; }
  .ms-l { font-size:9px; font-weight:500; color:rgba(20,40,70,0.55); text-transform:uppercase; letter-spacing:0.8px; margin-top:2px; }
  .ms-bar { height:2px; border-radius:2px; margin-top:7px; opacity:0.3; transform-origin:left; transition:opacity .2s, transform .2s; }
  .ms:hover .ms-bar { opacity:0.75; transform:scaleX(1.08); }

  .btn-ir { display: block; width:100%; padding:0.75rem; background: rgba(255,255,255,0.82); border: 1px solid rgba(255,255,255,0.9); border-radius: 50px; font-size: 0.9rem; font-weight: 600; color: #1a2a3a; text-align: center; cursor: pointer; transition: background 0.22s, color 0.22s, box-shadow 0.22s, transform 0.18s; opacity: 0; animation: fadeUp 0.4s 1s forwards; }
  .btn-ir:hover { background:#1a2a3a; color:#fff; box-shadow:0 4px 14px rgba(20,40,70,0.2); transform:translateY(-2px); }

  /* ── FOOTER MEJORADO ── */
  .card-footer-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    width: 100%;
    opacity: 0;
    animation: fadeUp 0.4s 1.1s forwards;
    background: rgba(255,255,255,0.25);
    border-radius: 12px;
    padding: 8px 14px;
  }
  .footer-dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: #3730d4; flex-shrink: 0;
  }
  .footer-label {
    font-size: 10px; font-weight: 600;
    text-transform: uppercase; letter-spacing: 0.8px;
    color: rgba(20,40,70,0.6);
  }
  .footer-sep {
    font-size: 10px; color: rgba(20,40,70,0.3);
  }
  .footer-sig {
    font-family:'Syne',sans-serif; font-size: 10px;
    font-weight: 700; letter-spacing: 1.5px;
    text-transform: uppercase; color: #3730d4; opacity: 0.7;
  }

  .location-row { display:flex; align-items:center; gap:6px; width:100%; }
  .location-dot { width:7px; height:7px; border-radius:50%; background:#e83c1a; box-shadow:0 0 0 2px rgba(232,60,26,0.2); flex-shrink:0; animation:pulseDot 2.5s ease-in-out infinite; }
  @keyframes pulseDot { 0%,100%{box-shadow:0 0 0 2px rgba(232,60,26,0.2)} 50%{box-shadow:0 0 0 5px rgba(232,60,26,0.1)} }
  .location-text { font-size:10px; font-weight:500; color:rgba(20,40,70,0.5); letter-spacing:0.3px; }

  @keyframes fadeUp { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:translateY(0); } }

  /* ── RESPONSIVE MÓVIL ── */
  @media (max-width: 480px) {
    body { padding: 1rem; align-items: center; }
    .screen { max-width: 100%; }
    .card { border-radius: 20px; padding: 1.8rem 1.4rem 1.6rem; }
    .card-logo { height: 70px; }
    .ms-n { font-size: 20px; }
  }
  .modal {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
  backdrop-filter: blur(4px);
}
.modal-content {
  background: white;
  padding: 2rem 2.2rem;
  border-radius: 20px;
  text-align: center;
  width: 320px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
.modal-content h2 {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  color: #1a2a3a;
  margin-bottom: 8px;
}
.modal-content p {
  font-size: 13px;
  color: #64748b;
  margin-bottom: 16px;
}
.modal-content input {
  width: 100%;
  padding: 10px 14px;
  border-radius: 10px;
  border: 1.5px solid #c7d9f8;
  font-size: 14px;
  margin-bottom: 12px;
  outline: none;
  font-family: 'DM Sans', sans-serif;
}
.modal-content input:focus {
  border-color: #2563eb;
  box-shadow: 0 0 0 3px rgba(37,99,235,0.15);
}
.modal-content button {
  width: 100%;
  padding: 11px;
  border: none;
  border-radius: 10px;
  background: linear-gradient(135deg, #3730d4, #2563eb);
  color: white;
  font-size: 15px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: opacity 0.2s;
}
.modal-content button:hover { opacity: 0.9; }
.modal-hint {
  font-size: 11px;
  color: #94a3b8;
  margin-top: 8px;
}
</style>
</head>
<body>

<div class="bg"></div>
<div class="blob blob-1"></div>
<div class="blob blob-2"></div>
<div class="blob blob-3"></div>

<div class="screen">
  <a href="{% url 'censo:panel' %}" class="card" id="main-card" onclick="handleClick(event, this.href, 'CENSO')">
    <div class="card-strip"></div>
    <div class="card-glare" id="card-glare"></div>
    <div class="card-inner">

      <div style="display:flex;align-items:center;justify-content:center;gap:14px;width:100%;">
  <img src="https://img.genially.com/5f0bae4c3ef16f3976db6be3/97338ce6-f960-4993-a1fb-9b21b7f2311c.png"
       alt="CENSO Chile" style="height:60px;width:120px;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.08));">
  <div style="width:1px;height:50px;background:rgba(20,40,70,0.2);flex-shrink:0;"></div>
  <img src="https://departamentosig.munivalpo.cl/media/assets/imagen_sig/None/adjunto_XZSA7xX.png"
       alt="SIG Valparaíso" style="height:60px;width:120px;object-fit:contain;filter:drop-shadow(0 2px 8px rgba(0,0,0,0.08));opacity:0.85;">
</div>

      <div class="location-row">
        <div class="location-dot"></div>
        <span class="location-text">Valparaíso · Región de Valparaíso</span>
      </div>

      <div class="rule"></div>

      <div class="mini-grid">
        <div class="ms">
          <div class="ms-n">296K</div>
          <div class="ms-l">Habitantes</div>
          <div class="ms-bar" style="width:60%;background:#3730d4"></div>
        </div>
        <div class="ms">
          <div class="ms-n">108K</div>
          <div class="ms-l">Viviendas</div>
          <div class="ms-bar" style="width:45%;background:#e83c1a"></div>
        </div>
        <div class="ms">
          <div class="ms-n">15</div>
          <div class="ms-l">OMZ</div>
          <div class="ms-bar" style="width:30%;background:#2daa6e"></div>
        </div>
        <div class="ms">
          <div class="ms-n">37</div>
          <div class="ms-l">Barrios</div>
          <div class="ms-bar" style="width:55%;background:#e8a020"></div>
        </div>
      </div>

      <div class="rule"></div>

      <span class="btn-ir">Ir acá →</span>

      <div class="card-footer-row">
        <div class="footer-dot"></div>
        <span class="footer-label">Depto. SIG Valparaíso</span>
        <span class="footer-sep">·</span>
        <span class="footer-sig">SIG · Chile</span>
      </div>

    </div>
  </a>
</div>
<div id="emailModal" class="modal">
  <div class="modal-content">
    <h2>Bienvenido</h2>
    <p>Ingrese su correo para continuar</p>
    <div class="modal-hint">Solo correos @munivalpo.cl</div>
    <input type="email" id="userEmail" placeholder="correo@ejemplo.cl" required>
    <button onclick="saveEmail()">Ingresar</button>
  </div>
</div>
<script>

const card  = document.getElementById('main-card');
const glare = document.getElementById('card-glare');
document.addEventListener("DOMContentLoaded", function() {
  const savedEmail = localStorage.getItem("userEmail");
  if (!savedEmail) {
    document.getElementById("emailModal").style.display = "flex";
  }
});document.addEventListener("DOMContentLoaded", function() {
    const savedEmail = localStorage.getItem("userEmail");
    if (!savedEmail) {
        document.getElementById("emailModal").style.display = "flex";

        const params = new URLSearchParams(window.location.search);
        const bloqueado = params.get('bloqueado');
        const invalido = params.get('correo_invalido');

        if (bloqueado === 'permanente') {
            document.querySelector('.modal-content').innerHTML = `
                <div style="font-size:60px;margin-bottom:1rem;">🚫</div>
                <h2 style="color:#dc2626;font-family:'Syne',sans-serif;">Acceso Bloqueado</h2>
                <p style="color:#64748b;margin-top:12px;font-size:13px;">Su acceso ha sido bloqueado permanentemente por múltiples intentos con correos falsos.</p>
                <p style="color:#94a3b8;font-size:11px;margin-top:8px;">Contacte al administrador: trabajossig@munivalpo.cl</p>
            `;
        } else if (bloqueado === '24h') {
            document.querySelector('.modal-content').innerHTML = `
                <div style="font-size:60px;margin-bottom:1rem;">⏳</div>
                <h2 style="color:#d97706;font-family:'Syne',sans-serif;">Acceso Suspendido</h2>
                <p style="color:#64748b;margin-top:12px;font-size:13px;">Su acceso ha sido suspendido por 24 horas por ingresar correos falsos.</p>
                <p style="color:#94a3b8;font-size:11px;margin-top:8px;">Intente nuevamente mañana.</p>
            `;
        } else if (invalido === '1') {
            document.querySelector('.modal-content p').innerHTML = 
                '⚠️ El correo ingresado no existe. Ingrese su correo institucional válido.';
            document.querySelector('.modal-content p').style.color = '#dc2626';
        }
    }
});
function iniciarMonitoreoEmail(email) {
    var intentos = 0;
    var intervalo = setInterval(function() {
        intentos++;
        if (intentos > 15) { clearInterval(intervalo); return; }
        
        fetch('/logging/estado-email/', {
            method: 'POST',
            headers: {'Content-Type': 'application/json', 'X-CSRFToken': getCookie('csrftoken')},
            body: JSON.stringify({email: email})
        })
        .then(r => r.json())
        .then(data => {
            if (data.status === 'invalido') {
                clearInterval(intervalo);
                localStorage.removeItem('userEmail');
                window.location.href = '/?correo_invalido=1';

            } else if (data.status === 'bloqueado_24h') {
                clearInterval(intervalo);
                localStorage.removeItem('userEmail');
                window.location.href = '/?bloqueado=24h';

            } else if (data.status === 'bloqueado_permanente') {
                clearInterval(intervalo);
                localStorage.removeItem('userEmail');
                window.location.href = '/?bloqueado=permanente';

            } else if (data.status === 'valido') {
                clearInterval(intervalo);
            }
        })
        .catch(function() { clearInterval(intervalo); });
    }, 5000);
}
function saveEmail() {
    const email = document.getElementById("userEmail").value.trim().toLowerCase();
    const btn = document.querySelector('.modal-content button');
    
    if (!email) { alert("Debe ingresar un correo."); return; }
    
    const emailRegex = /^[a-zA-Z0-9._%+\-]+@munivalpo\.cl$/;
    if (!emailRegex.test(email)) {
        alert("Solo se permiten correos @munivalpo.cl");
        return;
    }

    // Verificar en el backend
    btn.textContent = 'Verificando...';
    btn.disabled = true;

    fetch('/logging/verificar-email/', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
            'X-CSRFToken': getCookie('csrftoken')
        },
        body: JSON.stringify({ email: email })
    })
    .then(r => r.json())
    .then(data => {
    btn.textContent = 'Ingresar';
    btn.disabled = false;
    
    if (data.valid) {
        localStorage.setItem("userEmail", email);
        document.getElementById("emailModal").style.display = "none";
        iniciarMonitoreoEmail(email);
    } else if (data.bloqueado) {
        var contenido = '';
        if (data.permanente) {
            contenido = `
                <div style="font-size:72px;margin-bottom:1rem;">🚫</div>
                <h2 style="font-size:20px;font-weight:800;color:#dc2626;margin-bottom:8px;">Acceso Bloqueado</h2>
                <p style="font-size:13px;color:#64748b;margin-bottom:6px;">Su acceso ha sido bloqueado <strong>permanentemente</strong>.</p>
                <p style="font-size:13px;color:#64748b;margin-bottom:20px;">Contacte al administrador.</p>
                <div style="background:#fef2f2;border:1px solid #fecaca;border-radius:12px;padding:10px 14px;margin-bottom:20px;">
                    <p style="font-size:12px;color:#dc2626;font-weight:600;margin:0;">⚠️ trabajossig@munivalpo.cl</p>
                </div>`;
        } else {
            contenido = `
                <div style="font-size:72px;margin-bottom:1rem;">⏳</div>
                <h2 style="font-size:20px;font-weight:800;color:#d97706;margin-bottom:8px;">Acceso Suspendido</h2>
                <p style="font-size:13px;color:#64748b;margin-bottom:6px;">${data.error}</p>
                <div style="background:#fef3c7;border:1px solid #fde68a;border-radius:12px;padding:10px 14px;margin-bottom:20px;">
                    <p style="font-size:12px;color:#d97706;font-weight:600;margin:0;">⚠️ Este acceso ha sido registrado.</p>
                </div>`;
        }
        document.querySelector('.modal-content').innerHTML = contenido + `
            <button onclick="window.location.reload()" style="
                width:100%;padding:12px;border:none;border-radius:12px;
                background:linear-gradient(135deg,#dc2626,#b91c1c);
                color:white;font-size:15px;font-weight:700;cursor:pointer;">
                Cerrar
            </button>`;
    } else {
        alert(data.error || "Correo no válido. Verifica que sea tu correo institucional.");
    }
})
    .catch(() => {
        // Si falla la verificación, dejar pasar igual
        btn.textContent = 'Ingresar';
        btn.disabled = false;
        localStorage.setItem("userEmail", email);
        document.getElementById("emailModal").style.display = "none";
        iniciarMonitoreoEmail(email); // <-- agregar
    });
}
card.addEventListener('mouseenter', () => {
  card.style.transition = 'transform 0.3s cubic-bezier(.22,.68,0,1.2), box-shadow 0.3s ease';
  card.style.transform = 'perspective(900px) translateY(-22px) scale(1.025)';
  card.style.boxShadow = '0 40px 70px rgba(74,140,200,0.28), 0 16px 30px rgba(74,140,200,0.15)';
});
card.addEventListener('mousemove', e => {
  const r = card.getBoundingClientRect();
  const x = (e.clientX - r.left) / r.width;
  const y = (e.clientY - r.top)  / r.height;
  const rotY =  (x - 0.5) * 12;
  const rotX = -(y - 0.5) * 8;
  card.style.transition = 'transform 0.08s ease-out';
  card.style.transform = `perspective(900px) rotateY(${rotY}deg) rotateX(${rotX}deg) translateY(-22px) scale(1.025)`;
  glare.style.background = `radial-gradient(circle at ${x*100}% ${y*100}%, rgba(255,255,255,0.28) 0%, transparent 55%)`;
  glare.style.opacity = '1';
});
card.addEventListener('mouseleave', () => {
  card.style.transition = 'transform 0.6s cubic-bezier(.22,.68,0,1.15), box-shadow 0.5s ease-out';
  card.style.transform = 'perspective(900px) rotateY(0deg) rotateX(0deg) translateY(0px) scale(1)';
  card.style.boxShadow = '';
  glare.style.opacity = '0';
});

function handleClick(event, url, panel) {
  event.preventDefault();
  fetch("/logging/registrar-click/", {
    method: "POST",
    headers: { "Content-Type": "application/json", "X-CSRFToken": getCookie("csrftoken") },
    body: JSON.stringify({ email: localStorage.getItem("userEmail"), panel })
  })
  .then(() => { window.location.href = url; })
  .catch(() => { window.location.href = url; });
}
function getCookie(name) {
  for (const c of document.cookie.split(";")) {
    const t = c.trim();
    if (t.startsWith(name + "=")) return decodeURIComponent(t.slice(name.length + 1));
  }
  return null;
}
</script>
</body>
</html>

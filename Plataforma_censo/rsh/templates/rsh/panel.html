<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel RSH</title>
  <link rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

  <style>
  body {
      background: linear-gradient(130deg, #05dbf2aa 0%, #4d49bfdd 100%);
      background-attachment: fixed;
      font-family: 'Segoe UI', sans-serif;
      color: #2e2e2e;
      padding-top: 25px;
  }

  .col-md-3 {
      flex: 0 0 480px !important;
      max-width: 480px !important;
  }

  .sidebar {
      background: #ffffff;
      border-radius: 14px;
      padding: 40px 35px;
      border: 1px solid #d9e1ee;
      box-shadow: 0px 6px 20px rgba(0,0,0,0.12);
  }

  .sidebar > * {
      margin-bottom: 25px;
  }

  .top-buttons button {
      flex: 1;
      font-size: 17px;
      padding: 12px 0;
      border-radius: 10px !important;
      font-weight: 600;
  }

  .btn-modo-active {
      background-color: #2563eb !important;
      border-color: #1d4ed8 !important;
      color: white !important;
      box-shadow: 0px 0px 10px rgba(37,99,235,0.55);
  }

  #label-principal {
      font-size: 22px !important;
      font-weight: 700 !important;
      color: #1d4ed8 !important;
      margin-bottom: 12px !important;
      display: block;
  }

  .accordion-button {
      font-size: 17px;
      padding: 16px 18px;
      font-weight: 600;
  }

  .accordion-body {
      padding: 22px 25px !important;
      font-size: 16px;
  }

  .content-card {
      background: #fff;
      border-radius: 14px;
      padding: 35px;
      border: 1px solid #d9e3ef;
      box-shadow: 0px 6px 20px rgba(0,0,0,0.08);
  }

  thead th {
      background: #e7efff !important;
      color: #1e40af !important;
      font-weight: 700;
      font-size: 15px;
  }

  tbody td {
      font-size: 15px;
      padding: 10px 14px;
  }

  tbody tr:hover {
      background: #e5f1ff !important;
  }

  .logo-header {
      width: 100%;
      margin-bottom: 25px;
      display: flex;
      justify-content: center;
      position: relative;
  }

  .logo-sig {
      width: 330px;
      height: auto;
  }

  .volver-btn {
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      padding: 8px 14px;
      font-size: 16px;
      border-radius: 10px;
      opacity: 0.95;
  }

  .link-accion {
      font-size: 13px;
      cursor: pointer;
      color: #0d6efd;
      text-decoration: underline;
  }

  .accordion-header .link-accion {
    display: none;
    
}

/* Cuando el accordion está abierto → mostrar los botones */
.accordion-item .accordion-collapse.show ~ .accordion-header .link-accion,
.accordion-item .accordion-header button:not(.collapsed) ~ .link-accion {
    display: inline-block !important;
}
.grupo-acciones .link-accion {
    padding: 4px 12px;
    border-radius: 6px;
    background: #eef4ff; /* Fondo celeste muy claro */
    border: 1px solid #cdd7f5; /* Marco azul suave */
    font-size: 13px;
    cursor: pointer;
    color: #000000; /* Letras negras (por defecto) */
    text-decoration: none; /* Asegura que no haya subrayado */
    transition: background 0.2s, color 0.2s, border-color 0.2s; /* Transición suave para el hover */
}

.grupo-acciones .link-accion:hover {
    background: #dbe7ff; /* Fondo celeste más oscuro al pasar el cursor */
}

.grupo-acciones .link-accion-azul {
    /* Fondo blanco y letras azules */
    background: #ffffff; /* Fondo blanco */
    color: #0044cc; /* Letras azules */
    border: 1px solid #0044cc; /* Marco azul */
}

/* Hover para el estilo "Azul con Fondo Blanco" */
.grupo-acciones .link-accion-azul:hover {
    /* Cambio a fondo azul y letras blancas al acercarse */
    background: #0044cc; /* Fondo azul */
    color: #ffffff; /* Letras blancas */
    border-color: #0044cc; /* Mantiene el marco azul */
}

/* Estado de "deselección" (Marco Rojo) para el estilo base */
.grupo-acciones .link-accion.deseleccionado {
    border: 1px solid #ff0000; /* Marco rojo */
    background: #ffffff; /* Fondo blanco (si aplica) */
    color: #000000; /* Letras negras (si aplica) */
}

/* Hover para el estado de "deselección" con marco rojo */
.grupo-acciones .link-accion.deseleccionado:hover {
    /* Cambia a fondo rojo y letras blancas al acercarse */
    background: #ff0000; /* Fondo rojo */
    color: #ffffff; /* Letras blancas */
    border-color: #ff0000; /* Marco también rojo */
}
  </style>
</head>

<body class="p-3">

<!-- LOGO SUPERIOR -->
<div class="logo-header">
    <a href="/" class="btn btn-sm btn-outline-light volver-btn">&larr; Volver</a>
    <img src="https://departamentosig.munivalpo.cl/media/assets/imagen_sig/None/adjunto_2PDGoCX.png"
         alt="Logo SIG" class="logo-sig">
</div>


<div class="container-fluid">
  <div class="row g-3">

    <!-- SIDEBAR -->
    <div class="col-md-3">
      <div class="sidebar">

        <!-- BOTONES SUPERIORES -->
        <div class="d-flex gap-2 mb-3 top-buttons">
          <button id="btn-uv"  class="btn btn-outline-info" onclick="setModo('uv')">UV</button>
          <button id="btn-sb"  class="btn btn-outline-warning" onclick="setModo('sb')">SB</button>
          <button id="btn-omz" class="btn btn-outline-primary" onclick="setModo('omz')">OMZ</button>
          <button id="btn-cm"  class="btn btn-outline-dark" onclick="setModo('cm')">CM</button>
        </div>

        <label id="label-principal">Filtros por UV</label>

        <!-- =============================
             UVEC AUTOCOMPLETE
        ============================== -->
        <div id="uv-wrapper">
          <label>Buscar UVEC:</label>
          <input id="uv-search" class="form-control" placeholder="Ej: 104, 123...">
          <div id="uv-suggestions"
               class="list-group"
               style="display:none; position:absolute; z-index:999;">
          </div>
          <div id="uv-selected" class="mt-2 small"></div>
        </div>

        <!-- =============================
             SB (LISTA CHECKBOX)
        ============================== -->
        <div id="sb-busqueda-wrapper" style="display:none;">
  
  <div class="accordion" id="acordeon-sb">
    <div class="accordion-item">

      <h2 class="accordion-header">
        <button class="accordion-button collapsed" type="button"
                data-bs-toggle="collapse" data-bs-target="#sb-panel">
          Seleccionar Sectores Barriales
        </button>
      </h2>

      <div id="sb-panel" class="accordion-collapse collapse" 
           data-bs-parent="#acordeon-sb">
        <div class="accordion-body p-2" 
             style="max-height:250px; overflow-y:auto;">
          <div id="sb-checkboxes"></div>
        </div>
      </div>

    </div>
  </div>

  <div id="sb-selected" class="mt-2 small"></div>
</div>

        <!-- =============================
             OMZ (LISTA CHECKBOX)
        ============================== -->
        <div id="omz-busqueda-wrapper" style="display:none;">
  
  <div class="accordion" id="acordeon-omz">
    <div class="accordion-item">

      <h2 class="accordion-header">
        <button class="accordion-button collapsed" type="button"
                data-bs-toggle="collapse" data-bs-target="#omz-panel">
          Seleccionar OMZ
        </button>
      </h2>

      <div id="omz-panel" class="accordion-collapse collapse"
           data-bs-parent="#acordeon-omz">
        <div class="accordion-body p-2"
             style="max-height:250px; overflow-y:auto;">
          <div id="omz-checkboxes"></div>
        </div>
      </div>

    </div>
  </div>

  <div id="omz-selected" class="mt-2 small"></div>
</div>


        <!-- =============================
             CATEGORÍA
        ============================== -->
        <div class="mt-3">
          <label>Categoría:</label>
          <select id="categoria" class="form-select">
            <option value="habitante">Habitante</option>
            <option value="vivienda">Vivienda</option>
            <option value="educacion">Educación</option>
            <option value="salud">Salud</option>
            <option value="ocupacion">Ocupación</option>
          </select>
        </div>

        <!-- FILTROS DINÁMICOS -->
        <div id="contenedor-filtros-categoria" class="mt-3"></div>

        <!-- BOTÓN APLICAR -->
        <button id="btn-aplicar" class="btn w-100 btn-primary mt-3">Aplicar Filtros</button>

      </div>
    </div>

    <!-- =============================
         RESULTADOS
    ============================== -->
    <div class="col-md-9">
      <div class="content-card shadow-sm">

        <div class="d-flex justify-content-between mb-3">
          <h4></h4>
          <button id="btn-exportar" class="btn btn-outline-primary btn-sm">Exportar CSV</button>
        </div>

        <div class="table-responsive" style="max-height:70vh;">
          <table class="table table-bordered table-striped" id="tabla-resultados">
            <thead><tr id="tabla-head"></tr></thead>
            <tbody id="tabla-body"></tbody>
          </table>
        </div>

      </div>
    </div>

  </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<script>
/* ======================================================
   ESTADO GLOBAL
====================================================== */
  
let modo = "uv";
let uvLista = [];
let uvSeleccionadas = [];
let omzLista = [];
let omzSeleccionados = [];


/* ==========================================================
   📌 MODO (UV / SB / OMZ / CM) – por ahora sólo UV tiene filtros
   ========================================================== */
function setModo(m) {
    modo = m;
    limpiarTabla(); // ← limpia todo al cambiar de UV/SB/OMZ/CM
    document.querySelectorAll(".top-buttons button")
        .forEach(btn => btn.classList.remove("btn-modo-active"));

    const btn = document.getElementById(`btn-${m}`);
    if (btn) btn.classList.add("btn-modo-active");

    const label = {
        uv: "Filtros por UV",
        sb: "Filtros por Sector Barrial",
        omz: "Filtros por OMZ",
        cm: "Filtros Comunales"
    }[m] || "Filtros RSH";

    document.getElementById("label-principal").textContent = label;
    document.getElementById("omz-busqueda-wrapper").style.display = (modo === "omz") ? "block" : "none";
    // Mostrar / ocultar buscadores
    document.getElementById("uv-search").parentElement.style.display =
        (modo === "uv") ? "block" : "none";

    document.getElementById("sb-busqueda-wrapper").style.display =
        (modo === "sb") ? "block" : "none";

    // 🟡 Cuando entro a SB, lleno el SELECT
    if (m === "sb") {
        cargarSBSelector();
    }

    if (m === "omz") {
    cargarOMZSelector();
}

    cargarFiltrosCategoria();
}


/* ==========================================================
   📌 CARGAR UVEC DESDE /censo/api/uv/
   ========================================================== */
async function cargarUVEC() {
    try {
        const res = await fetch("/censo/api/uv/");
        uvLista = await res.json();
    } catch (e) {
        console.error("Error cargando UVEC:", e);
    }
}
let sbLista = [];
let sbSeleccionados = [];

async function cargarSB() {
    try {
        const res = await fetch("/censo/api/sb/");
        sbLista = await res.json();
    } catch(e) {
        console.error("Error cargando SB:", e);
    }
}

async function cargarOMZ() {
    try {
        const res = await fetch("/censo/api/omz/");
        omzLista = await res.json();
    } catch(e) {
        console.error("Error cargando OMZ:", e);
    }
}

function cargarOMZSelector() {
    const cont = document.getElementById("omz-checkboxes");
    if (!cont) return;

    cont.innerHTML = "<p class='text-muted small'>Cargando...</p>";

    if (!omzLista.length) {
        cont.innerHTML = "<p class='text-muted small'>Sin datos OMZ.</p>";
        return;
    }

    cont.innerHTML = omzLista.map(o => `
        <div class="form-check mb-1">
            <input class="form-check-input omz-check" 
                   type="checkbox"
                   value="${o.id}"
                   data-nombre="${o.nombre}">
            <label class="form-check-label">
                ${o.nombre}
            </label>
        </div>
    `).join("");

    // Manejar selección
    document.querySelectorAll(".omz-check").forEach(ch => {
        ch.addEventListener("change", () => {
            actualizarOMZSeleccionados();
        });
    });
}

function actualizarOMZSeleccionados() {
    omzSeleccionados = [];

    document.querySelectorAll(".omz-check:checked").forEach(ch => {
        omzSeleccionados.push({
            id: parseInt(ch.value),
            nombre: ch.getAttribute("data-nombre")
        });
    });

    renderOMZSeleccionados();
}
function actualizarSBSeleccionados() {
    sbSeleccionados = [];

    document.querySelectorAll(".sb-check:checked").forEach(ch => {
        sbSeleccionados.push({
            id: parseInt(ch.value),
            nombre: ch.getAttribute("data-nombre")
        });
    });

    console.log("SB seleccionados:", sbSeleccionados);
}
function cargarSBSelector() {
    const cont = document.getElementById("sb-checkboxes");
    if (!cont) return;

    cont.innerHTML = "<p class='text-muted small'>Cargando...</p>";

    if (!sbLista.length) {
        cont.innerHTML = "<p class='text-muted small'>Sin datos SB.</p>";
        return;
    }

    // Generar checkboxes
    cont.innerHTML = sbLista.map(sb => `
        <div class="form-check mb-1">
            <input class="form-check-input sb-check" 
                   type="checkbox"
                   value="${sb.id}"
                   data-nombre="${sb.nombre}">
            <label class="form-check-label">
                ${sb.nombre}
            </label>
        </div>
    `).join("");

    // Manejar selección
    document.querySelectorAll(".sb-check").forEach(ch => {
        ch.addEventListener("change", () => {
            actualizarSBSeleccionados();
        });
    });
}
const sbSelect = document.getElementById("sb-select");

if (sbSelect) {
    sbSelect.addEventListener("change", (e) => {
        const id = parseInt(e.target.value);
        if (!id) return;

        const sb = sbLista.find(s => s.id === id);
        if (!sb) return;

        agregarSB(sb.id, sb.nombre);   // ya la tienes definida
        e.target.value = "";           // vuelve a "Seleccione..."
    });
}
const uvSearch = document.getElementById("uv-search");
const uvSuggestions = document.getElementById("uv-suggestions");

uvSearch.addEventListener("input", e => {
    const txt = e.target.value.trim().toLowerCase();
    uvSuggestions.innerHTML = "";

    if (txt.length < 1) {
        uvSuggestions.style.display = "none";
        return;
    }

    const filtradas = uvLista.filter(uv =>
        (uv.cod_uv || "").toLowerCase().includes(txt) ||
        (uv.nombre || "").toLowerCase().includes(txt)
    ).slice(0, 15);

    if (!filtradas.length) {
        uvSuggestions.style.display = "none";
        return;
    }

    filtradas.forEach(uv => {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "list-group-item list-group-item-action";
        btn.textContent = `${uv.cod_uv} ${uv.nombre ?? ""}`;
        btn.onclick = () => {
            agregarUVEC(uv.cod_uv, uv.nombre ?? "");
            uvSearch.value = "";
            uvSuggestions.innerHTML = "";
            uvSuggestions.style.display = "none";
        };
        uvSuggestions.appendChild(btn);
    });

    uvSuggestions.style.display = "block";
});

document.addEventListener("click", e => {
    if (!uvSuggestions.contains(e.target) && e.target !== uvSearch) {
        uvSuggestions.style.display = "none";
    }
});

function agregarUVEC(cod, nombre) {
    if (!uvSeleccionadas.find(u => u.cod === cod)) {
        uvSeleccionadas.push({ cod, nombre });
    }
    renderUVECSeleccionadas();
}

function eliminarUVEC(cod) {
    uvSeleccionadas = uvSeleccionadas.filter(u => u.cod !== cod);
    renderUVECSeleccionadas();
}

function renderUVECSeleccionadas() {
    const cont = document.getElementById("uv-selected");
    cont.innerHTML = "";

    uvSeleccionadas.forEach(u => {
        cont.innerHTML += `
            <span class="badge bg-primary me-1 mb-1">
                ${u.cod} ${u.nombre}
                <span onclick="eliminarUVEC('${u.cod}')" style="cursor:pointer; margin-left:4px;">&times;</span>
            </span>
        `;
    });
}
const sbSearch = document.getElementById("sb-search");
const sbSuggestions = document.getElementById("sb-suggestions");



function agregarSB(id, nombre) {
    if (!sbSeleccionados.find(s => s.id === id)) {
        sbSeleccionados.push({ id, nombre });
    }
    renderSBSeleccionados();
}

function eliminarSB(id) {
    sbSeleccionados = sbSeleccionados.filter(s => s.id !== id);
    renderSBSeleccionados();
}



/* ==========================================================
   📌 FILTROS POR CATEGORÍA
   ========================================================== */
document.getElementById("categoria").addEventListener("change", cargarFiltrosCategoria);

function cargarFiltrosCategoria() {
    document.querySelectorAll(".filtro-rsh").forEach(ch => ch.remove());
    const categoria = document.getElementById("categoria").value;
    const cont = document.getElementById("contenedor-filtros-categoria");

    // ---------------- HABITANTE ----------------
    if (categoria === "habitante") {
    cont.innerHTML = `
    <div class="accordion" id="ac-filtros-habitante">

      <!-- SOCIODEMOGRÁFICO -->
      <div class="accordion-item">
        <h2 class="accordion-header">
          <button class="accordion-button collapsed" type="button"
                  data-bs-toggle="collapse" data-bs-target="#cp-socio">
            Relación Sociodemográfica
          </button>
        </h2>

        <div id="cp-socio" class="accordion-collapse collapse" data-bs-parent="#ac-filtros-habitante">
          <div class="accordion-body">

            <!-- 🔥 BOTONES ABAJO DEL TÍTULO -->
            <div class="d-flex justify-content-end gap-3 mb-3 grupo-acciones">
              <span class="link-accion" data-accion="select" data-group="socio">Marcar todo</span>
              <span class="link-accion" data-accion="unselect" data-group="socio">Quitar todo</span>
            </div>

            <!-- CONTENIDOS -->
            <h6 class="fw-bold">Cantidad de Habitantes</h6>
            <div class="form-check mb-2">
              <input class="form-check-input filtro-rsh"
                     type="checkbox" data-field="socio" value="habitantes_total">
              <label class="form-check-label">Total de Habitantes</label>
            </div>

            <h6 class="fw-bold mt-3">Sexo</h6>
            <div class="form-check mb-1">
              <input class="form-check-input filtro-rsh"
                     type="checkbox" data-field="socio" value="sexo_1">
              <label class="form-check-label">Masculino</label>
            </div>
            <div class="form-check mb-1">
              <input class="form-check-input filtro-rsh"
                     type="checkbox" data-field="socio" value="sexo_2">
              <label class="form-check-label">Femenino</label>
            </div>

            <h6 class="fw-bold mt-3">Nacionalidad</h6>
            <div class="form-check mb-1">
              <input class="form-check-input filtro-rsh"
                     type="checkbox" data-field="socio" value="nacionalidad_1">
              <label class="form-check-label">Chilena</label>
            </div>
            <div class="form-check mb-1">
              <input class="form-check-input filtro-rsh"
                     type="checkbox" data-field="socio" value="nacionalidad_2">
              <label class="form-check-label">Extranjera</label>
            </div>

          </div>
        </div>
      </div>

      <!-- PARENTESCO -->
      <div class="accordion-item mt-2">
        <h2 class="accordion-header">
          <button class="accordion-button collapsed" type="button"
                  data-bs-toggle="collapse" data-bs-target="#cp-parentesco">
            Relación Familiar (Parentesco)
          </button>
        </h2>

        <div id="cp-parentesco" class="accordion-collapse collapse" data-bs-parent="#ac-filtros-habitante">
          <div class="accordion-body">
            <div class="d-flex justify-content-end gap-3 mb-3 grupo-acciones">
              <span class="link-accion" data-accion="select" data-group="parentescoid">Marcar todo</span>
              <span class="link-accion" data-accion="unselect" data-group="parentescoid">Quitar todo</span>
            </div>

            ${generarChecksParentesco()}
          </div>
        </div>
      </div>

      <!-- INDIGENA -->
      <div class="accordion-item mt-2">
        <h2 class="accordion-header">
          <button class="accordion-button collapsed" type="button"
                  data-bs-toggle="collapse" data-bs-target="#cp-indigena">
            Pertenencia a Pueblo Indígena
          </button>
        </h2>

        <div id="cp-indigena" class="accordion-collapse collapse" data-bs-parent="#ac-filtros-habitante">
          <div class="accordion-body">
            <div class="d-flex justify-content-end gap-3 mb-3 grupo-acciones">
              <span class="link-accion" data-accion="select" data-group="indigena">Marcar todo</span>
              <span class="link-accion" data-accion="unselect" data-group="indigena">Quitar todo</span>
            </div>

            ${generarChecksIndigena()}
          </div>
        </div>
      </div>

      <!-- TRAMO -->
      <div class="accordion-item mt-2">
        <h2 class="accordion-header">
          <button class="accordion-button collapsed" type="button"
                  data-bs-toggle="collapse" data-bs-target="#cp-tramo">
            Tramo
          </button>
        </h2>

        <div id="cp-tramo" class="accordion-collapse collapse" data-bs-parent="#ac-filtros-habitante">
          <div class="accordion-body">
            <div class="d-flex justify-content-end gap-3 mb-3 grupo-acciones">
              <span class="link-accion" data-accion="select" data-group="tramo">Marcar todo</span>
              <span class="link-accion" data-accion="unselect" data-group="tramo">Quitar todo</span>
            </div>

            ${generarChecksTramo()}
          </div>
        </div>
      </div>

    </div>`;
}

else if (categoria === "vivienda") {
    cont.innerHTML = `
    <div class="accordion" id="ac-filtros-vivienda">

      <!-- V1 -->
      <div class="accordion-item">
        <h2 class="accordion-header">
          <button class="accordion-button collapsed" data-bs-toggle="collapse" data-bs-target="#cp-v1">
            Tipo de vivienda
          </button>
        </h2>

        <div id="cp-v1" class="accordion-collapse collapse" data-bs-parent="#ac-filtros-vivienda">
          <div class="accordion-body">

            <div class="d-flex justify-content-end gap-3 mb-3 grupo-acciones">
              <span class="link-accion" data-accion="select" data-group="v1">Marcar todo</span>
              <span class="link-accion" data-accion="unselect" data-group="v1">Quitar todo</span>
            </div>

            ${generarChecksV1()}
          </div>
        </div>
      </div>

      <!-- V2 -->
      <div class="accordion-item mt-2">
        <h2 class="accordion-header">

/* ==========================================================
   📌 APLICAR FILTROS → LLAMAR /rsh/api/consulta/
   ========================================================== */
document.getElementById("btn-aplicar").addEventListener("click", async () => {

    // 1️⃣ Validación dependiente del modo
    if (modo === "uv") {
        if (!uvSeleccionadas.length) {
            alert("Debe seleccionar al menos una UVEC.");
            return;
        }
    }

    if (modo === "sb") {
        if (!sbSeleccionados.length) {
            alert("Debe seleccionar al menos un Sector Barrial.");
            return;
        }
    }

    if (modo === "omz") {
        if (!omzSeleccionados.length) {   // si usas variable diferente, cámbiala
            alert("Debe seleccionar al menos una OMZ.");
            return;
        }
    }

    // 2️⃣ Al menos un filtro seleccionado
    const hayFiltros = document.querySelectorAll(".filtro-rsh:checked").length > 0;
    if (!hayFiltros) {
        alert("Debe seleccionar al menos un filtro.");
        return;
    }

    // 3️⃣ Construir filtros
    const categoria = document.getElementById("categoria").value;
    const filtros = {};

    document.querySelectorAll(".filtro-rsh:checked").forEach(ch => {
        const field = ch.getAttribute("data-field");
        const raw = ch.value;

        const val = isNaN(parseInt(raw)) ? raw : parseInt(raw);

        if (!filtros[field]) filtros[field] = [];
        filtros[field].push(val);
    });

    // 4️⃣ Construir body dinámico
    const body = {
        uvec: (modo === "uv") ? uvSeleccionadas.map(u => u.cod) : [],
        sb:   (modo === "sb") ? sbSeleccionados.map(s => s.id) : [],
        omz:  (modo === "omz") ? omzSeleccionados.map(o => o.id) : [],
        categoria,
        filtros
    };

    // 5️⃣ Ejecutar API
    try {

    // 🔥 LIMPIAR SB Y OMZ PARA EVITAR CADENAS VACÍAS
    body.sb = (body.sb || [])
                .filter(x => x !== "" && x !== null && !isNaN(x))
                .map(Number);

    body.omz = (body.omz || [])
                .filter(x => x !== "" && x !== null && !isNaN(x))
                .map(Number);

    const res = await fetch("/rsh/api/consulta/", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(body)
    });

    const data = await res.json();
    renderTabla(data);

} catch (e) {
    console.error("Error consultando API RSH:", e);
    alert("Ocurrió un error al consultar los datos RSH.");
}
});

    accItem.querySelectorAll(".link-accion").forEach(btn => {
        btn.style.display = "inline-block";
    });
});

document.addEventListener('hidden.bs.collapse', (e) => {
    const accItem = e.target.closest(".accordion-item");
    if (!accItem) return;
    accItem.querySelectorAll(".link-accion").forEach(btn => {
        btn.style.display = "none";
    });

function formatNumber(num) {
    if (num === null || num === undefined || num === "") return "0";
    num = Number(num);
    return num.toLocaleString("es-CL"); // ← Formato con puntos
}

/* ==========================================================
   📌 EXPORTAR CSV
   ========================================================== */
document.getElementById("btn-exportar").addEventListener("click", () => {
    const rows = [];
    document.querySelectorAll("#tabla-resultados tr").forEach(tr => {
        const cols = [...tr.children].map(td =>
            `"${td.innerText.replace(/"/g, '""')}"`);
        rows.push(cols.join(";"));
    });

    const blob = new Blob([rows.join("\n")], { type: "text/csv" });
    const url = URL.createObjectURL(blob);

    const a = document.createElement("a");
    a.href = url;
    a.download = "rsh.csv";
    a.click();

    URL.revokeObjectURL(url);
});
